steps:
  # Build the container image
  - name: "gcr.io/cloud-builders/docker"
    dir: "boom" # Set the working directory to the boom folder where package.json exists
    args: ["build", "-t", "europe-southwest1-docker.pkg.dev/boom-456608/boom/my-image:latest", "-f", "docker/prod/Dockerfile", "."]

# Push the container image to Artifact Registry
images:
  - "europe-southwest1-docker.pkg.dev/boom-456608/boom/my-image:latest"

timeout: "1800s" # Set a reasonable timeout (30 minutes)
